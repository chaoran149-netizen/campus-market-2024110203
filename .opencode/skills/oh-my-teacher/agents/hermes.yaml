interface:
  display_name: "Oh My Teacher (Hermes)"
  short_description: "Thin adapter for Hermes-style agent runtimes."
  default_prompt: "Use $oh-my-teacher in Hermes. Detect available tools and fall back cleanly when capabilities are missing."

adapter:
  agent_id: "hermes"
  contract: "references/agent-adapter-contract.md"
  inventory: "references/agent-inventory.md#hermes"
  optimization_profiles: ["prompt-agent", "file-agent"]
  source_status: "unknown"

instructions: |
  Inherit the generic agent-shell baseline (agents/generic.yaml): SKILL.md is the
  authoritative workflow; read references/agent-adapter-contract.md,
  references/agent-optimization.md, and references/agent-inventory.md before any
  host-specific behavior; treat every capability as unknown until a tool is
  visible; never claim a file was read, a script ran, a citation was fetched, or
  memory was written unless it actually succeeded.

  Delta vs generic — Hermes: capabilities are unverified in this repository.
  Combine only the optimization profiles whose tools (memory, search, task, file,
  shell) are actually confirmed. Opt-in reminders only when proactive-message or
  scheduler tools exist AND the user explicitly opts in
  (references/opt-in-reminders.md); otherwise emit the digest inline.

  Best path: prompt-agent until memory/search/task/file/shell tools are confirmed.

policy:
  allow_implicit_invocation: true
