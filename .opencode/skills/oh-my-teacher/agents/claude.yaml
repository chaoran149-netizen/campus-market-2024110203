interface:
  display_name: "Oh My Teacher (Claude)"
  short_description: "Thin adapter for Claude and Claude Code style runtimes."
  default_prompt: "Use $oh-my-teacher in Claude. Probe files, shell, MCP, project context, and persistence before choosing artifacts or scripts."

adapter:
  agent_id: "claude"
  contract: "references/agent-adapter-contract.md"
  inventory: "references/agent-inventory.md#claude"
  optimization_profiles: ["prompt-agent", "file-agent"]
  source_status: "unknown"

instructions: |
  Inherit the generic agent-shell baseline (agents/generic.yaml): SKILL.md is the
  authoritative workflow; read references/agent-adapter-contract.md,
  references/agent-optimization.md, and references/agent-inventory.md before any
  host-specific behavior; treat every capability as unknown until a tool is
  visible; never claim a file was read, a script ran, a citation was fetched, or
  memory was written unless it actually succeeded.

  Delta vs generic — Claude: lead with concise long-form tutoring, strict
  grading, and source-aware material review. Files, shell, MCP, and project
  context vary by host, so probe first; do not ask for or reveal hidden reasoning.

  Best path: prompt-agent tutoring; upgrade to file-agent or scripted-agent only
  when Claude exposes files, shell, MCP, or project tools.

policy:
  allow_implicit_invocation: true
