name: CI

on:
  push:
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run package checks
        run: python scripts/package_check.py --full
