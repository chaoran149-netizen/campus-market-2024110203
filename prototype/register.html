<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #67c23a22, #409eff22); }
    .auth-card { width: 460px; background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div id="app">
    <div class="auth-page">
      <div class="auth-card">
        <div class="text-center mb-8">
          <a href="index.html" style="font-size:28px;font-weight:700;color:#409eff;text-decoration:none;">🎒 校园轻集市</a>
          <p class="text-gray-400 mt-2" style="font-size:14px;">注册新账号，开启校园集市之旅</p>
        </div>
        <el-form>
          <el-form-item>
            <el-input v-model="form.email" placeholder="请输入学号或邮箱" prefix-icon="Message" size="large" />
          </el-form-item>
          <el-form-item>
            <el-input v-model="form.nickname" placeholder="请输入昵称" prefix-icon="User" size="large" />
          </el-form-item>
          <el-form-item>
            <el-input v-model="form.password" type="password" placeholder="请输入密码（至少 6 位）" prefix-icon="Lock" show-password size="large" />
          </el-form-item>
          <el-form-item>
            <el-input v-model="form.confirm" type="password" placeholder="请确认密码" prefix-icon="Lock" show-password size="large" />
          </el-form-item>
          <el-form-item>
            <el-select v-model="form.campus" placeholder="选择校区" style="width:100%;" size="large">
              <el-option label="主校区" value="main"></el-option>
              <el-option label="东校区" value="east"></el-option>
              <el-option label="西校区" value="west"></el-option>
            </el-select>
          </el-form-item>
          <div class="mb-4">
            <el-checkbox v-model="agree">我已阅读并同意 <a href="#" class="text-blue-500">《用户协议》</a> 和 <a href="#" class="text-blue-500">《隐私政策》</a></el-checkbox>
          </div>
          <el-button type="primary" size="large" style="width:100%;" @click="register" :disabled="!agree">注 册</el-button>
        </form>
        <div class="text-center mt-4" style="font-size:13px;color:#909399;">
          已有账号？<a href="login.html" class="text-blue-500 no-underline hover:underline">立即登录</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    const app = Vue.createApp({
      data() { return { form: { email: '', nickname: '', password: '', confirm: '', campus: '' }, agree: false }; },
      methods: {
        register() {
          if (!this.form.email || !this.form.nickname || !this.form.password) { this.$message.warning('请填写完整信息'); return; }
          if (this.form.password !== this.form.confirm) { this.$message.error('两次密码不一致'); return; }
          if (this.form.password.length < 6) { this.$message.error('密码至少 6 位'); return; }
          this.$message.success('注册成功！');
          setTimeout(() => window.location.href = 'home.html', 800);
        }
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
