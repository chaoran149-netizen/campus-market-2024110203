<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 发布失物</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <link rel="stylesheet" href="assets/common.css">
</head>
<body>
  <div id="app">
    <div class="app-container">
      <div class="topbar">
        <div class="topbar-inner">
          <a href="index.html" class="topbar-logo">🎒 校园轻集市</a>
          <div class="topbar-nav">
            <el-button text @click="go('/home.html')">首页</el-button>
            <el-button text @click="go('/category.html')">集市浏览</el-button>
            <el-button text type="primary" @click="go('/publish.html')">发布信息</el-button>
            <el-button text @click="go('/messages.html')">消息</el-button>
            <el-button text @click="go('/profile.html')">个人中心</el-button>
          </div>
          <div class="topbar-right">
            <el-avatar size="small" style="background:#409eff;">张</el-avatar>
            <span class="text-sm text-gray-600">张三</span>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="breadcrumb-wrap">
          <el-breadcrumb>
            <el-breadcrumb-item :to="{ path: '/home.html' }">首页</el-breadcrumb-item>
            <el-breadcrumb-item :to="{ path: '/publish.html' }">发布信息</el-breadcrumb-item>
            <el-breadcrumb-item>发布失物招领</el-breadcrumb-item>
          </el-breadcrumb>
        </div>

        <div class="form-layout">
          <div class="form-main">
            <el-card shadow="never" style="border-radius:12px;">
              <h2 class="text-xl font-bold text-gray-800 mb-6">🔍 发布失物招领</h2>

              <el-steps :active="1" align-center style="margin-bottom:32px;">
                <el-step title="填写信息" />
                <el-step title="确认发布" />
                <el-step title="发布成功" />
              </el-steps>

              <el-form label-width="110px">
                <el-form-item label="类型" required>
                  <el-radio-group v-model="form.type">
                    <el-radio value="lost">我丢失了物品</el-radio>
                    <el-radio value="found">我捡到了物品</el-radio>
                  </el-radio-group>
                </el-form-item>

                <el-form-item label="物品名称" required>
                  <el-input v-model="form.title" :placeholder="form.type === 'lost' ? '请输入丢失物品名称，如：黑色 AirPods Pro 耳机盒' : '请输入捡到物品名称，如：校园卡一张'" />
                </el-form-item>

                <div class="grid grid-cols-2 gap-4">
                  <el-form-item label="校区" required>
                    <el-select v-model="form.campus" placeholder="选择校区" style="width:100%;">
                      <el-option label="主校区" value="main"></el-option>
                      <el-option label="东校区" value="east"></el-option>
                      <el-option label="西校区" value="west"></el-option>
                    </el-select>
                  </el-form-item>
                  <el-form-item label="具体地点">
                    <el-input v-model="form.location" placeholder="如：三食堂一楼" />
                  </el-form-item>
                </div>

                <div class="grid grid-cols-2 gap-4">
                  <el-form-item label="发生时间">
                    <el-date-picker v-model="form.eventTime" type="datetime" placeholder="选择时间" style="width:100%;" />
                  </el-form-item>
                  <el-form-item label="联系方式">
                    <el-input v-model="form.contact" placeholder="手机号或微信" />
                  </el-form-item>
                </div>

                <el-form-item label="物品特征" required>
                  <el-input v-model="form.features" type="textarea" :rows="3" :placeholder="form.type === 'lost' ? '请描述物品的外观、颜色、品牌等特征，方便他人识别' : '请描述物品的外观特征，方便失主确认'" />
                </el-form-item>

                <el-form-item label="详细描述">
                  <el-input v-model="form.desc" type="textarea" :rows="4" placeholder="补充说明丢失或捡到的经过、时间等细节" />
                </el-form-item>

                <el-form-item label="上传图片">
                  <div class="upload-area border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-blue-400 transition-colors">
                    <span style="font-size:28px;">📷</span>
                    <p class="text-sm text-gray-400 mt-1">点击上传物品图片（如有）</p>
                  </div>
                </el-form-item>

                <el-form-item>
                  <div class="flex gap-3">
                    <el-button type="primary" size="large" @click="submit">✏️ 提交发布</el-button>
                    <el-button size="large">💾 保存草稿</el-button>
                  </div>
                </el-form-item>
              </el-form>
            </el-card>
          </div>

          <div class="form-sidebar">
            <el-card shadow="never" style="border-radius:12px;margin-bottom:16px;">
              <h3 class="font-semibold text-gray-800 mb-2">📌 发布须知</h3>
              <ul class="text-xs text-gray-500 space-y-2 pl-4" style="list-style:disc;">
                <li>请如实描述物品特征，便于匹配</li>
                <li>丢失物品建议附上关键特征</li>
                <li>捡到物品建议写上捡到时间和地点</li>
                <li>认领时请核验身份，防止冒领</li>
              </ul>
            </el-card>
          </div>
        </div>
      </div>

      <div class="footer">校园轻集市 · 让校园生活更简单</div>
    </div>
  </div>

  <script>
    const app = Vue.createApp({
      data() {
        return {
          form: { type: 'lost', title: '', campus: '', location: '', eventTime: '', contact: '', features: '', desc: '' }
        };
      },
      methods: {
        go(url) { window.location.href = url; },
        submit() { this.$message.success('发布成功！'); }
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
